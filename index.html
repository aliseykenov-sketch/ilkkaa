<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Менің сүйікті фильмім</title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background-color: #111111;
            color: #ffffff;
            padding: 40px 20px;
            box-shadow: 0 4px 8px rgba(255,255,255,0.2);
        }

        header h1 {
            font-size: 48px;
            margin: 0;
        }

        header h2 {
            font-size: 24px;
            margin: 5px 0 0 0;
            font-style: italic;
            color: #aaaaaa;
        }

       
        nav {
            margin: 30px 0;
        }

        nav a {
            text-decoration: none;
            color: #ffffff;
            background-color: #333333;
            padding: 15px 30px;
            margin: 5px;
            border-radius: 12px;
            font-size: 18px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        nav a:hover {
            background-color: #555555;
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 10px rgba(0,0,0,0.5);
        }

       
        .photos {
            margin: 20px auto;
        }

        .photos img {
            width: 300px;
            margin: 15px;
            border-radius: 10px;
            border: 2px solid #ffffff;
            box-shadow: 0 4px 8px rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        .photos img:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(255,255,255,0.4);
        }

          
        footer {
            background-color: #111111;
            color: #ffffff;
            padding: 15px;
            font-size: 16px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
